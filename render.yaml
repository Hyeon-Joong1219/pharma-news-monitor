services:
  - type: web
    name: pharma-news-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -w 1 --timeout 120 -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
