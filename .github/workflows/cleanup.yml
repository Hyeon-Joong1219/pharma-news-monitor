name: Daily Cleanup

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 KST 자정 (UTC 15:00)
  workflow_dispatch:         # 수동 실행 버튼

concurrency:
  group: pharma-db-write    # fetch.yml과 동일한 그룹 → 동시 실행 방지
  cancel-in-progress: false  # 실행 중인 fetch가 끝난 후 cleanup 실행

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Re-score all recent articles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scoring.py 30

      - name: Re-classify relevance (force, 7 days)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python relevance_ai.py 7 --force
