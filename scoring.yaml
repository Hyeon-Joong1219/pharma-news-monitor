# 전문 제약/바이오 매체 기본 관련성 보너스
# (히트뉴스, 팜뉴스 등 dedicated 소스는 이 값을 기본 부여)
dedicated_relevance_bonus: 8

# 관련성 최소 임계값: relevance_score < 이 값 → hidden=1
# 0 = 순수 음수 신호만 있는 기사 차단
# 3 = 제약/바이오 양수 신호 최소 1개 이상 필요 (권장)
# 5 = 더 엄격한 필터링
relevance_threshold: 3

cluster_settings:
  time_window_hours: 48     # 같은 이슈로 묶을 최대 시간 간격
  min_shared_words: 3       # 제목 공유 단어 수 기준
  source_boost_per_source:  0.5   # 추가 매체 1곳당 50% 점수 가산
  min_word_length: 4        # 클러스터링에 사용할 최소 단어 길이

score_display:
  tier3: 20   # 🔥🔥🔥 대형 이슈
  tier2: 10   # 🔥🔥 주요 뉴스
  tier1: 4    # 🔥  관심 뉴스
